name: Fetch Analytics (24 h after upload)

on:
  # Run every day at 6:30 AM IST (01:00 UTC) — roughly 13+ hours after the
  # daily pipeline which runs at 5 PM IST (11:30 UTC the previous day).
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  fetch-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Database Artifact
        uses: actions/download-artifact@v4
        with:
          name: sqlite-database
        continue-on-error: true  # First run may have no artifact

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch & Store Analytics
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, ".")
          from src.podcast_automation.services.analytics import run_analytics_update
          run_analytics_update()
          PY

      - name: Upload Updated Database
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sqlite-database
          path: podcast_automation.db
