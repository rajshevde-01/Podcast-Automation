name: Daily Podcast Shorts Automation

on:
  schedule:
    # 5:00 PM IST (11:30 UTC)
    - cron: "30 11 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Previous Database
        uses: actions/download-artifact@v4
        with:
          name: sqlite-database
        continue-on-error: true # First run will have no artifact

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick libgl1 libsm6 libxext6 pkg-config libavformat-dev libavcodec-dev libavdevice-dev libavutil-dev libswscale-dev libswresample-dev libavfilter-dev
          # Fix ImageMagick policy to allow text rendering for moviepy
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml || true

      - name: Cache PyTorch & Models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/huggingface
          key: podcast-automation-${{ runner.os }}-py311
          restore-keys: podcast-automation-${{ runner.os }}-

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -U yt-dlp # Always get the absolute latest for bypass

      - name: Run Main Automation Script
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
        run: |
          python -c 'import os; open("cookies.txt", "w", encoding="utf-8").write(os.environ.get("YOUTUBE_COOKIES", "") + "\n")'
          mkdir -p logs
          python main.py

      - name: Upload Logs & Debug Info
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-logs
          path: logs/

      - name: Upload Database Tracker Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sqlite-database
          path: podcast_automation.db
